name: CI (Security Audit & Build Check)

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  audit_and_build:
    name: Security & Build Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install All Dependencies
        run: npm install

      - name: API Security Audit
        working-directory: ./api
        run: npm audit --audit-level=high

      - name: Frontend Build Verification
        working-directory: ./client
        run: npm run build

      - name: Deployment Template Validation
        run: |
          if [ ! -f api/.env.example ]; then echo "Missing api/.env.example"; exit 1; fi
          if [ ! -f client/.env.example ]; then echo "Missing client/.env.example"; exit 1; fi
          echo "All deployment templates present."
